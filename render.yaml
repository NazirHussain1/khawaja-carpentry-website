services:
  - type: web
    name: mujahid-hussain-carpentry
    env: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: INQUIRY_TO_EMAIL
        value: mujahidhussaincarpentry@gmail.com
      - key: ALLOWED_ORIGINS
        value: https://mujahidhussaincarpentry.store,https://www.mujahidhussaincarpentry.store
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: khawaja_carpentry
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_FOLDER
        value: khawaja-carpentry
